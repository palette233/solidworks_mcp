name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore bridge solution
        run: dotnet restore bridge/SolidWorksBridge.sln --nologo

      - name: Restore tray app
        run: dotnet restore app/SolidWorksMcpApp/SolidWorksMcpApp.csproj --nologo

      - name: Build tray app
        run: dotnet build app/SolidWorksMcpApp/SolidWorksMcpApp.csproj --configuration Release --no-restore --nologo

      - name: Run bridge unit tests
        run: dotnet test bridge/SolidWorksBridge.sln --configuration Release --no-restore --filter "Category!=Integration" --nologo